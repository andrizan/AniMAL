name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    environment: build-config
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool/pub
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Update version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          sed -i "s/^version: .*/version: ${VERSION}+${BUILD_NUMBER}/" pubspec.yaml
          echo "Version set to ${VERSION}+${BUILD_NUMBER}"

      - run: flutter pub get

      - run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release-keystore.jks
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release-keystore.jks
          EOF

      - name: Build APK
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.configureondemand=true -Dorg.gradle.jvmargs=-Xmx4g"
        run: |
          flutter build apk --release --no-pub \
            --dart-define=MAL_CLIENT_ID="${{ secrets.MAL_CLIENT_ID }}" \
            --dart-define=MAL_CLIENT_SECRET="${{ secrets.MAL_CLIENT_SECRET }}" \
            --dart-define=MAL_REDIRECT_URI="${{ secrets.MAL_REDIRECT_URI }}"

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/animal-${{ github.ref_name }}.apk

      - uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/animal-${{ github.ref_name }}.apk
          generate_release_notes: true
